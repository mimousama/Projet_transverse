<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Site avec Firebase</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-form">
    <h2>Connexion / Inscription</h2>
    <input type="email" id="email" placeholder="Ton email">
    <input type="password" id="password" placeholder="Ton mot de passe">
    
    <div class="buttons">
        <button id="btn-signup">S'inscrire</button>
        <button id="btn-login">Se connecter</button>
    </div>
    
    <p id="message"></p>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
